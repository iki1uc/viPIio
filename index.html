<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>RUN8 – VEC.tor + 4u.link + PQ/PX/PR</title>

<style>
    body { background:#0a0a0a; color:#e0e0e0; font-family:Consolas, monospace; padding:20px; }
    h1 { color:#00e0ff; }
    pre { background:#111; padding:15px; border-left:4px solid #00e0ff; }
    button {
        background:#00e0ff; border:none; padding:10px 20px;
        font-family:Consolas; cursor:pointer; margin-top:10px;
    }
</style>
</head>

<body>

<h1>RUN8 – Systemstatus</h1>
<p>Alle Module verbunden: VEC.tor • 4u.link • PQ/PX/PR • viPIio</p>

<pre id="run8">RUN8 wird geladen…</pre>

<button id="testBtn">Vector-Test PQ → PX</button>

<script type="module">
    import VEC from "./VEC.tor";

    // 4u.link – Kontaktkern
    const FourULink = {
        contact() {
            return {
                PX: VEC.PX,
                PQ: VEC.PQ,
                PR: VEC.PR,
                channel: VEC.channel,
                time: Date.now()
            };
        },
        scan() {
            const c = this.contact();
            return {
                devices: {
                    PX: c.PX.id,
                    PQ: c.PQ.id,
                    PR: c.PR.id
                },
                channel: c.channel,
                timestamp: c.time
            };
        }
    };

    // RUN8 – alles zusammenführen
    function RUN8() {
        const scan = FourULink.scan();

        document.getElementById("run8").textContent =
            "RUN8 aktiv\n" +
            "Channel: " + scan.channel + "\n" +
            "Geräte erkannt:\n" +
            "  PX (Apple):  " + scan.devices.PX + "\n" +
            "  PQ (Laptop): " + scan.devices.PQ + "\n" +
            "  PR (PC):     " + scan.devices.PR + "\n" +
            "Status: System verbunden";
    }

    RUN8();

    // Vector-Test
    document.getElementById("testBtn").onclick = () => {
        const packet = VEC.send("PQ-LAPTOP", "PX-APPLE", "Hallo Apple");
        const result = VEC.recv(packet);

        document.getElementById("run8").textContent =
            "RUN8 aktiv\n" +
            "Vector-Test:\n" +
            JSON.stringify(result, null, 2);
    };
</script>

</body>
</html>
