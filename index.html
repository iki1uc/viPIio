<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>VEC.tor – PQ / PX / PR Routing</title>

<style>
    body { background:#0a0a0a; color:#e0e0e0; font-family:Consolas, monospace; padding:20px; }
    h1 { color:#00e0ff; }
    pre { background:#111; padding:15px; border-left:4px solid #00e0ff; }
    button {
        background:#00e0ff; border:none; padding:10px 20px;
        font-family:Consolas; cursor:pointer; margin-top:10px;
    }
</style>
</head>

<body>

<h1>VEC.tor – PQ / PX / PR Routing</h1>
<p>Dieses Modul lädt <strong>VEC.tor</strong> direkt aus deinem Repo und führt Vector‑Routing aus.</p>

<pre id="output">Lade VEC.tor…</pre>
<pre id="root">Lade 4u.link…</pre>

<button id="testBtn">Vector-Test ausführen</button>

<script type="module">
    import VEC from "./VEC.tor";

    // System-Bindung
    const System = {
        vec: VEC,
        route(from, to, data) {
            const packet = this.vec.send(from, to, data);
            return this.vec.recv(packet);
        }
    };

    // UI-Test
    document.getElementById("testBtn").onclick = () => {
        const result = System.route("PQ-LAPTOP", "PX-APPLE", "Hallo Apple");
        document.getElementById("output").textContent =
            JSON.stringify(result, null, 2);
    };

    // Initialstatus
    document.getElementById("output").textContent =
        "VEC.tor geladen\n" +
        "PQ / PX / PR bereit\n" +
        "Routing aktiv";
</script>

<script type="module">
    import VEC from "./VEC.tor";

    // 4u.link – NC‑like Kontaktkern für viPIio
    const FourULink = {
        matrix: "4u.matrix",
        filter: "4u.filter",
        upstream: "4u.upstream",
        slots: "4u.slots",

        // Vector‑Kontakt: PQ / PX / PR
        contact() {
            return {
                PX: VEC.PX,
                PQ: VEC.PQ,
                PR: VEC.PR,
                active: true,
                channel: VEC.channel,
                time: Date.now()
            };
        },

        // KI‑Scan: findet IMMER einen Kontakt
        scan() {
            const c = this.contact();
            return {
                found: true,
                devices: {
                    PX: c.PX.id,
                    PQ: c.PQ.id,
                    PR: c.PR.id
                },
                channel: c.channel,
                timestamp: c.time
            };
        },

        // NC‑like Status
        status() {
            return {
                link: "4u.link",
                vec: "active",
                upstream: this.upstream,
                slots: this.slots,
                ready: true
            };
        }
    };

    // viPIio Integration
    window.addEventListener("DOMContentLoaded", () => {
        const scan = FourULink.scan();
        const status = FourULink.status();

        const root = document.getElementById("root");
        root.textContent =
            "viPIio – Kontaktkern aktiv\n" +
            "4u.link: " + status.link + "\n" +
            "Channel: " + scan.channel + "\n" +
            "Geräte erkannt:\n" +
            "  PX (Apple):  " + scan.devices.PX + "\n" +
            "  PQ (Laptop): " + scan.devices.PQ + "\n" +
            "  PR (PC):     " + scan.devices.PR + "\n" +
            "Status: bereit";
    });
</script>

</body>
</html>
